<mat-toolbar color="primary" class="shadow-sm">
  <span class="font-semibold mr-6">ZeeMate</span>
  <nav class="flex gap-2">
    <a mat-button routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
    <a mat-button routerLink="/trips" routerLinkActive="active-link">Trips</a>
    <a mat-button routerLink="/charging" routerLinkActive="active-link">Charging</a>
    <a mat-button routerLink="/statistics" routerLinkActive="active-link">Statistics</a>
  </nav>
  <span class="flex-1"></span>
  @if (vehicles$ | async; as vehicles) {
    @if (vehicles.length) {
      <mat-form-field appearance="outline" class="vehicle-select">
        <mat-label>Vehicle</mat-label>
        <mat-select
          [value]="(selectedVin$ | async) ?? vehicles[0].vin"
          (selectionChange)="onVinChange($event.value)"
        >
          @for (vehicle of vehicles; track vehicle.vin) {
            <mat-option [value]="vehicle.vin">{{ vehicle.name || vehicle.vin }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    }
  }
  <button mat-button (click)="logout()">Sign out</button>
</mat-toolbar>

<main class="page">
  <router-outlet />
</main>
